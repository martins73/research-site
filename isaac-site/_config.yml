# Build Settings
markdown: kramdown
sass:
  style: compressed
plugins:
  - jekyll-sitemap

# Pages collection (content pages live in _pages/)
collections:
  pages:
    output: true

# Include files that Jekyll would normally skip
include:
  - _redirects
  - _headers

# Exclude from processing
exclude:
  - README.md
  - _data/theme/README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      author: Isaac Tucker
