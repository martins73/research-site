# Assets & Logic
favicon: /assets/logos/favicon.svg
main_css: /assets/css/style.css
mobile_breakpoint: 768
avatar: /assets/profile_picture.webp
avatar_version: 1   # Bump this number only when you update the profile picture
spin_duration: 3200
service_worker: /sw.js

# Client-side interaction toggles
scroll_reveal: true       # Enable scroll animations (set to false to disable)
scroll_reveal_mode: "slide"     # "fade" = elements start invisible and fade in + slide up on scroll (one-shot)
                                # "slide" = elements stay visible but continuously slide up into position as you scroll
scroll_reveal_offset: 145         # (slide mode) Max translateY in px — reduced to avoid section overlap artifacts.
scroll_reveal_opacity: 0.5      # (slide mode) Starting opacity (0–1). Higher improves readability during movement.
scroll_reveal_settle: 0.58       # (slide mode) Viewport fraction (0–1) where elements reach final position.
                                 #   Higher values make elements settle sooner after entering viewport.
scroll_reveal_smoothing: "0.16s" # (slide mode) CSS transition duration that smooths per-frame updates.
                                 #   Higher = more lag but silkier. "0s" = instant (no smoothing).
scroll_reveal_easing: 2.2        # (slide mode) Ease-out exponent. Controls how the animation decelerates.
                                 #   1 = linear, 2 = gentle ease, 3 = stronger ease-out
scroll_reveal_threshold: 0.15   # (fade mode) Fraction of element that must be visible before reveal (0–1)
scroll_reveal_margin: "-15%"    # (fade mode) Shrinks the trigger zone from viewport bottom so
                                # elements start appearing when they're well in view,
                                # not at the very edge. Negative = inward.
scroll_reveal_duration: "0.8s"  # (fade mode) How long the fade-in + slide-up transition takes.
typewriter_abstract: false      # Letter-by-letter typing effect on abstract expand (set to false to disable)
typewriter_speed: 10            # Milliseconds between each character when typing abstracts.
                                # Lower = faster. 12ms ≈ ~80 chars/sec, feels like fast typing.

